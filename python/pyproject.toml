[project]
name = "zrth"
requires-python = ">=3.11,<3.14"
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Python :: Implementation :: PyPy",
]

version="0.1.0"
# dynamic = ["version"]
description = "Zeroth reactive modules Python interface"
readme = "README.md"

# TODO: make dependencies optional based on what crates
# we want to build
dependencies = [
  "maturin==1.9",
  # for toy and smt crates
  "pysmt>=0.9.6",
  # for torch crate
  "torch==2.9.0",
]

[project.optional-dependencies]
torch = [
    "torch==2.9.0",
]

[build-system]
requires = ["maturin>=1.9,<2.0"]
build-backend = "maturin"

[tool.maturin]
features = ["pyo3/extension-module"]
module-name = "zrth._zrth"

[dependency-groups]
dev = [
    "cvc5>=1.3.2",
    "pytest>=9.0.2",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
#python_files = ["test_*.py"]
addopts = "--import-mode=importlib"


