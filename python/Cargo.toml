[package]
name = "zrth-python"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[lib]
name = "zrth"
crate-type = ["cdylib"]

[dependencies]
base = { path = "../base" }
common = { path = "../common" }
bmc = { path = "../bmc" }
smt = { path = "../smt", optional = true}
pyo3 = { version = "0.24" }
visual = { path = "../visual", features = ["html"], optional = true }
tch = { features = ["python-extension"], version = "0.22" }
pyo3-tch = { version = "0.22" }



[features]
default = ["visual-html"]
# dumping modules to HTML
visual-html = ["visual/html"]
enable-smt = ["smt"]
