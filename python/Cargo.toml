[package]
name = "zrth-python"
version = "0.1.0"
edition = "2024"

[lib]
name = "zrth"
crate-type = ["cdylib"]

[dependencies]
base = { path = "../base" }
toy = { path = "../toy" }
pyo3 = { version = "0.24" }
visual = { path = "../visual", features=["html"], optional = true }



[features]
default = ["visual-html"]
# dumping modules to HTML
visual-html = ["visual/html", "toy/visual-html"]

