 name = "ZerothHammerTests"
 version = "0.1.0"
 defaultTargets = ["ZerothHammerTests", "ZerothHammer", "Certs", "ManualTests", "Playground"]

 [[lean_lib]]
 name = "Core"

 # Generated: standalone zeroth_hammer tactic (no module-specific macros)
 [[lean_lib]]
 name = "ZerothHammer"

 # Generated: self-contained certificate proofs (one per module, inline init/update)
 [[lean_lib]]
 name = "Certs"

 # Manually written: test zeroth_hammer on standalone goal shapes
 [[lean_lib]]
 name = "ManualTests"
 roots = ["ManualTests.Basic"]

 [[lean_lib]]
 name = "ZerothHammerTests"
 roots = ["ZerothHammerTests"]

 # Playground: interactive scratchpad + proof-pattern regression tests
 [[lean_lib]]
 name = "Playground"
 roots = ["Playground"]

 [[require]]
 name = "cslib"
 scope = "leanprover"
 rev = "v4.28.0"

 [[require]]
 name = "smt"
 git = "https://github.com/ufmg-smite/lean-smt.git"
 rev = "f58d19d5d0803fcccb5ccb1b4473774dd2ae9f9a"
