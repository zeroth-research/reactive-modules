// --- Cytoscape Setup ---
const cy = cytoscape({
  container: document.getElementById('cy'),
  elements: graphData.elements,
  style: [
    { selector: 'node', style: {
        'label': 'data(label)',
        'text-valign': 'center',
        'color': '#222',
        'background-color': '#77b5fe',
        'font-size': 12,
        'width': 'label',
        'height': 'label',
        'shape': 'rectangle',
        'padding': '1em',
    }},
    { selector: 'node.input', style: {
        'background-color': '#77feb5',
    }},
    { selector: 'node.output', style: {
        'background-color': '#fe77b5',
    }},
    { selector: ':parent', style: {
        'label': 'data(label)',
        'text-valign': 'top',
        'text-halign': 'center',
        'background-opacity': 0.1,
        'border-width': 2,
        'border-color': '#666',
        'shape': 'round-rectangle',
        'padding': '25px',
        'font-weight': 'bold',
        'font-size': 14
    }},
    { selector: 'edge', style: {
        'width': 2,
        'label': 'data(label)',
        'line-color': '#aaa',
        'text-background-color': 'white',
        'text-background-opacity': 0.7,
        'text-background-shape': 'roundrectangle',
        'curve-style': 'bezier',
        'target-arrow-shape': 'triangle',
        'edge-text-rotation': 'autorotate'
    }},
    { selector: 'edge[id^="order."]', style: {
        'opacity': 0,
        'width': 0,
        'label': ''
    }},
    { selector: 'edge:selected', style: {
        'line-color': 'red',
    }},
    { selector: 'node:selected', style: {
        'border-width': 3,
        'border-color': '#ff6600'
    }}
  ],
  layout: { 
    name: 'dagre',
    rankDir: 'LR',  // Left to Right
    nodeSep: 30,    // Vertical separation between unconnected nodes
    edgeSep: 30,    // Edge separation
    rankSep: 100,   // Horizontal separation between ranks (wire length/distance between terms)
    ranker: 'network-simplex',
    animate: false,
    fit: true,
    padding: 20
  }
});

// --- Info Panel Logic ---
const infoDiv = document.getElementById('info');

    cy.on('tap', 'node', (evt) => {
    const node = evt.target;
    const data = node.data();

    // Use the full HTML description provided by the descriptor when
    // available. Fall back to a simple heading if no description is set.
    if (data.description && data.description.length > 0) {
        infoDiv.innerHTML = data.description;
    } else {
        infoDiv.innerHTML = `
            <h2>${data.label}</h2>
            <p>No description available.</p>
        `;
    }
});

cy.on('tap', (evt) => {
  // Click on background → reset info panel
  if (evt.target === cy) {
    infoDiv.innerHTML = `
      <h2>Node Information</h2>
      <p>Click any node or cluster to see details here.</p>
    `;
  }
});
</script>

</body>
</html>
