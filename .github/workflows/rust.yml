name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

# The theory crate depends on tch/torch-sys, which locates libtorch via the
# installed python `torch` package (LIBTORCH_USE_PYTORCH=1 in .cargo/config.toml).
# All build/test/lint commands go through the `just` recipes: they run cargo inside
# the uv env (so torch is on the build path) and set the per-OS dynamic-linker vars
# needed to run the torch-linked test binaries.
jobs:
  rustfmt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install latest nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Install just
        uses: extractions/setup-just@v2
      - run: just fmt-check

  clippy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install latest nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install just
        uses: extractions/setup-just@v2
      - name: Sync python env (installs torch for torch-sys)
        run: uv sync
      - run: just clippy

  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: stable-torch
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install just
        uses: extractions/setup-just@v2
      - name: Sync python env (installs torch for torch-sys)
        run: uv sync
      - name: Build (all targets, all features)
        run: just build-all
      - name: Run Rust tests (incl. doctests)
        run: just test-rust


  python-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: stable-torch
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install just
        uses: extractions/setup-just@v2
      - name: Run Python tests (builds the extension via maturin)
        run: just test-python

