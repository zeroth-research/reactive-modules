name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

# The theory crate depends on tch/torch-sys, which locates libtorch via the
# installed python `torch` package (LIBTORCH_USE_PYTORCH), so the Rust jobs
# install it with uv and run cargo inside that venv.
jobs:
  rustfmt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install latest nightly
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install latest nightly
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          override: true
          components: clippy
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Sync python env (installs torch for torch-sys)
        working-directory: python
        run: uv sync
      - name: Clippy
        working-directory: python
        run: uv run --no-sync -- cargo +nightly clippy --manifest-path ../Cargo.toml --all-targets --all-features -- -D warnings
  
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Sync python env (installs torch for torch-sys) + expose libtorch
        working-directory: python
        run: |
          uv sync
          echo "LD_LIBRARY_PATH=$(uv run --no-sync python -c 'import torch, os; print(os.path.join(os.path.dirname(torch.__file__), "lib"))')${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
      - name: Build
        working-directory: python
        run: uv run --no-sync -- cargo build --manifest-path ../Cargo.toml --all-targets --all-features --verbose
      - name: Run tests
        working-directory: python
        run: uv run --no-sync -- cargo test --manifest-path ../Cargo.toml --all-targets --all-features --verbose
      - name: Run doctests
        working-directory: python
        run: uv run --no-sync -- cargo test --manifest-path ../Cargo.toml --all-features --doc --verbose

  python-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies and build Python extension
        working-directory: python
        run: |
          uv sync
          uv run maturin develop
      - name: Run Python tests
        working-directory: python
        run: uv run pytest
