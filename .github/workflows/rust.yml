name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

# The theory crate depends on tch/torch-sys, which locates libtorch via the
# installed python `torch` package (LIBTORCH_USE_PYTORCH), so the Rust jobs
# install it with uv and run cargo inside that venv.
jobs:
  rustfmt:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install latest nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Install latest nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Sync python env (installs torch for torch-sys)
        working-directory: python
        run: uv sync
      - name: Clippy
        working-directory: python
        run: uv run --no-sync -- cargo +nightly clippy --manifest-path ../Cargo.toml --all-targets --all-features -- -D warnings
  
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      #      - name: Install libpython development headers
      #        run: |
      #          sudo apt-get update
      #          sudo apt-get install -y libpython-dev
      #      - name: Install Poetry
      #        run: |
      #          pipx install poetry
      #          poetry --version
      #      - name: Install Python dependencies with Poetry
      #        working-directory: torch
      #        run: |
      #          poetry config virtualenvs.in-project true
      #          poetry install --no-interaction --no-ansi
      #          VENV_PATH="$(poetry env info --path)"
      #          echo "VIRTUAL_ENV=${VENV_PATH}" >> $GITHUB_ENV
      #          echo "${VENV_PATH}/bin" >> $GITHUB_PATH
      #
      #          echo "PYO3_PYTHON=/usr/bin/python3" >> $GITHUB_ENV
      #          echo "PYO3_USE_ABI3=0" >> $GITHUB_ENV
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Sync python env (installs torch for torch-sys) + expose libtorch
        working-directory: python
        run: |
          uv sync
          echo "LD_LIBRARY_PATH=$(uv run --no-sync python -c 'import torch, os; print(os.path.join(os.path.dirname(torch.__file__), "lib"))')${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
      - name: Build
        working-directory: python
        run: uv run --no-sync -- cargo build --manifest-path ../Cargo.toml --all-targets --all-features --verbose
      - name: Run tests
        working-directory: python
        run: uv run --no-sync -- cargo test --manifest-path ../Cargo.toml --all-targets --all-features --verbose
      - name: Run doctests
        working-directory: python
        run: uv run --no-sync -- cargo test --manifest-path ../Cargo.toml --all-features --doc --verbose

  python-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: python/pyproject.toml
      - name: Install dependencies and build Python extension
        working-directory: python
        run: |
          uv sync
          uv run maturin develop
      - name: Run Python tests
        working-directory: python
        run: uv run pytest
